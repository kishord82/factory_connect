###############################################################################
# FactoryConnect — Full Local Stack
# Usage: docker compose -f docker/docker-compose.local.yml up --build
###############################################################################

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: factoryconnect
      POSTGRES_USER: fc_app
      POSTGRES_PASSWORD: fc_password
    ports:
      - "5432:5432"
    volumes:
      - fc_pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fc_app -d factoryconnect"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fc_redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── HashiCorp Vault (Dev Mode) ─────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: fc-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fc-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  # ─── MinIO (S3-compatible Object Storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: fc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: fc-minio-access
      MINIO_ROOT_PASSWORD: fc-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fc_miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── DB Migrations (run-once init container) ────────────────────
  db-migrate:
    image: postgres:16-alpine
    container_name: fc-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: fc_app
      DB_PASSWORD: fc_password
      DB_NAME: factoryconnect
    volumes:
      - ../packages/database/migrations:/migrations:ro
      - ../packages/database/seed:/seed:ro
      - ./run-migrations.sh:/run-migrations.sh:ro
    entrypoint: ["sh", "/run-migrations.sh"]
    restart: "no"

  # ─── API (Express.js + tsx dev server) ──────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.dev
    container_name: fc-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://fc_app:fc_password@postgres:5432/factoryconnect
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: fc-dev-token
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: fc-minio-access
      MINIO_SECRET_KEY: fc-minio-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../packages/shared/src:/app/packages/shared/src
      - ../packages/database/src:/app/packages/database/src
      - ../packages/observability/src:/app/packages/observability/src

  # ─── Portal (React + Vite dev server) ──────────────────────────
  portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.portal.dev
    container_name: fc-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-5173}:5173"
    environment:
      API_TARGET: http://api:3000
    depends_on:
      - api
    volumes:
      - ../apps/portal/src:/app/apps/portal/src
      - ../packages/shared/src:/app/packages/shared/src

volumes:
  fc_pgdata:
  fc_redisdata:
  fc_miniodata:
