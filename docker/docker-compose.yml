###############################################################################
# FactoryConnect — Development Docker Compose
# Services: PostgreSQL 16, Redis 7, Keycloak 24, Vault, MinIO, OpenAS2, Caddy
# Usage: docker compose -f docker/docker-compose.yml up -d
###############################################################################

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: factoryconnect
      POSTGRES_USER: fc_app
      POSTGRES_PASSWORD: fc_password
    ports:
      - "5432:5432"
    volumes:
      - fc_pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fc_app -d factoryconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fc_redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak 24 (Auth + MFA) ───────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fc-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/factoryconnect
      KC_DB_USERNAME: fc_app
      KC_DB_PASSWORD: fc_password
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy

  # ─── HashiCorp Vault (Secrets + FLE Transit) ────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: fc-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fc-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - fc_vaultdata:/vault/data

  # ─── MinIO (S3-compatible Object Storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: fc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: fc-minio-access
      MINIO_ROOT_PASSWORD: fc-minio-secret
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - fc_miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── OpenAS2 (EDI AS2 Transport Sidecar) ────────────────────────
  openas2:
    image: openas2/openas2:latest
    container_name: fc-openas2
    restart: unless-stopped
    ports:
      - "4080:4080"   # HTTP
      - "4081:4081"   # HTTPS
    volumes:
      - fc_as2data:/opt/openas2/data
      - ./openas2/config:/opt/openas2/config:ro

  # ─── Caddy 2 (Reverse Proxy + Auto-SSL) ─────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: fc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - fc_caddydata:/data
      - fc_caddyconfig:/config

volumes:
  fc_pgdata:
  fc_redisdata:
  fc_vaultdata:
  fc_miniodata:
  fc_as2data:
  fc_caddydata:
  fc_caddyconfig:
