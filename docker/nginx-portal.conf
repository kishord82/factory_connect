# FactoryConnect Portal — Nginx Server Configuration

server {
  listen 3001;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https:" always;

  # React SPA routing: send all requests to index.html except for static files
  location / {
    try_files $uri $uri/ /index.html =404;

    # Cache static assets long-term (files with hash in name)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    # Don't cache HTML
    location ~* \.html?$ {
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}
