###############################################################################
# FactoryConnect — Build, Push to GHCR & Deploy to OCI
# Triggers: push to main or phase1-dev, or manual dispatch
# Requires repository secrets:
#   OCI_SSH_KEY           — Private SSH key for OCI VM
#   OCI_HOST              — OCI VM IP (92.4.94.2)
###############################################################################

name: Deploy to OCI

on:
  push:
    branches: [main, phase1-dev]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".claude/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  # ─── Run CI First ───────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ─── Build & Push Docker Images to GHCR ─────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      api_image: ${{ steps.vars.outputs.api_image }}
      portal_image: ${{ steps.vars.outputs.portal_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "api_image=ghcr.io/${OWNER_LC}/fc-api" >> $GITHUB_OUTPUT
          echo "portal_image=ghcr.io/${OWNER_LC}/fc-portal" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.api_image }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.portal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.portal_image }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.portal_image }}:latest
          cache-from: type=gha,scope=portal
          cache-to: type=gha,scope=portal,mode=max

  # ─── Deploy to OCI ─────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SHA_SHORT: ${{ needs.build-push.outputs.sha_short }}
          API_IMAGE: ${{ needs.build-push.outputs.api_image }}
          PORTAL_IMAGE: ${{ needs.build-push.outputs.portal_image }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: SHA_SHORT,API_IMAGE,PORTAL_IMAGE
          script_stop: true
          timeout: 300s
          script: |
            set -euo pipefail
            cd ~/fc/scripts/oci

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true

            echo "=== Pulling new images (sha: $SHA_SHORT) ==="
            docker pull --platform linux/arm64 ${API_IMAGE}:${SHA_SHORT}
            docker pull --platform linux/arm64 ${PORTAL_IMAGE}:${SHA_SHORT}

            # Tag for compose
            docker tag ${API_IMAGE}:${SHA_SHORT} fc-api:latest
            docker tag ${PORTAL_IMAGE}:${SHA_SHORT} fc-portal:latest

            echo "=== Updating compose to use pre-built images ==="
            # Use env vars to override build with image
            export FC_API_IMAGE=fc-api:latest
            export FC_PORTAL_IMAGE=fc-portal:latest

            echo "=== Running database migrations ==="
            bash ~/fc/scripts/oci/run-migrations.sh || echo "Migration warning (non-fatal)"

            echo "=== Rolling restart ==="
            docker compose -f docker-compose.oci.yml --env-file .env.production up -d --no-build api portal

            echo "=== Health check ==="
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost/healthz > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Waiting... (attempt $i/6)"
              sleep 10
            done
            echo "ERROR: Health check failed after 6 attempts"
            exit 1

      - name: Post-deploy verification
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: opc
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo ""
            echo "=== API health ==="
            curl -sf http://localhost/healthz && echo " OK" || echo " FAILED"
            echo ""
            echo "=== Auth test ==="
            curl -sf http://localhost/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@factoryconnect.io","password":"fcadmin123"}' \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Login OK: role={d[\"role\"]}')" \
              || echo "Auth test FAILED"
            echo ""
            echo "=== Connections test (migration check) ==="
            curl -sf http://localhost/api/v1/connections?page=1 \
              -H "Authorization: Bearer $(curl -sf http://localhost/api/v1/auth/login \
                -H 'Content-Type: application/json' \
                -d '{"email":"admin@factoryconnect.io","password":"fcadmin123"}' \
                | python3 -c 'import sys,json; print(json.load(sys.stdin)["token"])')" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Connections OK: {d.get(\"total\",\"?\")} records')" \
              || echo "Connections test FAILED (migrations may not have run)"
