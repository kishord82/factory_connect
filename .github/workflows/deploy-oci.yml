###############################################################################
# FactoryConnect — Build (ARM64), Push to GHCR & Deploy to OCI
# Trigger: manual only (workflow_dispatch — click "Run workflow" in GitHub UI)
#
# Required repository secrets:
#   OCI_SSH_KEY   — Private SSH key for OCI VM (opc@92.4.94.2)
#
# Built-in secrets used (no configuration needed):
#   GITHUB_TOKEN  — Auto-provided by Actions; used for GHCR push (packages:write)
###############################################################################

name: Deploy to OCI (manual)

on:
  push:
    branches: [phase1-dev]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".claude/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "phase1-dev"
        type: string
      reason:
        description: "Reason for this deploy"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-oci-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: kishord82
  OCI_HOST: 92.4.94.2
  OCI_USER: opc
  OCI_PROJECT_DIR: /home/opc/fc
  COMPOSE_FILE: /home/opc/fc/scripts/oci/docker-compose.oci.yml
  ENV_FILE: /home/opc/fc/scripts/oci/.env.production

jobs:
  # ─── Build & Push ARM64 Images to GHCR ──────────────────────────────
  build-push:
    name: Build & Push (linux/arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      api_image: ${{ steps.vars.outputs.api_image }}
      portal_image: ${{ steps.vars.outputs.portal_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set image variables
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "api_image=ghcr.io/${{ env.REGISTRY_OWNER }}/fc-api" >> $GITHUB_OUTPUT
          echo "portal_image=ghcr.io/${{ env.REGISTRY_OWNER }}/fc-portal" >> $GITHUB_OUTPUT

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API Image ──────────────────────────────────────────────────
      - name: Docker meta (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.api_image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push API (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=arm64-api
          cache-to: type=gha,scope=arm64-api,mode=max

      # ── Portal Image ───────────────────────────────────────────────
      - name: Docker meta (Portal)
        id: meta-portal
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.portal_image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push Portal (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.portal
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-portal.outputs.tags }}
          labels: ${{ steps.meta-portal.outputs.labels }}
          cache-from: type=gha,scope=arm64-portal
          cache-to: type=gha,scope=arm64-portal,mode=max

  # ─── Deploy to OCI ───────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: build-push
    environment: phase1-dev

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ env.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull images & restart containers on OCI
        env:
          SHA_SHORT: ${{ needs.build-push.outputs.sha_short }}
          API_IMAGE: ${{ needs.build-push.outputs.api_image }}
          PORTAL_IMAGE: ${{ needs.build-push.outputs.portal_image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/oci_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ env.OCI_USER }}@${{ env.OCI_HOST }} \
              "set -euo pipefail

              echo '=== Logging in to GHCR ==='
              echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GITHUB_ACTOR}' --password-stdin

              echo '=== Pulling API image (arm64) ==='
              docker pull --platform linux/arm64 ${API_IMAGE}:${SHA_SHORT}

              echo '=== Pulling Portal image (arm64) ==='
              docker pull --platform linux/arm64 ${PORTAL_IMAGE}:${SHA_SHORT}

              echo '=== Tagging images as latest ==='
              docker tag ${API_IMAGE}:${SHA_SHORT} ${API_IMAGE}:latest
              docker tag ${PORTAL_IMAGE}:${SHA_SHORT} ${PORTAL_IMAGE}:latest

              echo '=== Restarting containers via docker compose ==='
              docker compose \
                -f ${{ env.COMPOSE_FILE }} \
                --env-file ${{ env.ENV_FILE }} \
                up -d --no-build --pull never api portal

              echo '=== Waiting for containers to stabilise ==='
              sleep 10

              echo '=== Container status ==='
              docker compose \
                -f ${{ env.COMPOSE_FILE }} \
                --env-file ${{ env.ENV_FILE }} \
                ps api portal
              "

      - name: Health check
        run: |
          ssh -i ~/.ssh/oci_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ env.OCI_USER }}@${{ env.OCI_HOST }} \
              "set -euo pipefail

              echo '=== Health check (up to 10 attempts) ==='
              for i in \$(seq 1 10); do
                if curl -sf --max-time 5 http://localhost/healthz > /dev/null 2>&1; then
                  echo \"Health check passed on attempt \$i\"
                  exit 0
                fi
                echo \"Attempt \$i/10 — not ready yet, waiting 6s...\"
                sleep 6
              done

              echo 'ERROR: Health check failed after 10 attempts (60s)'
              echo '=== Recent API logs ==='
              docker compose \
                -f ${{ env.COMPOSE_FILE }} \
                --env-file ${{ env.ENV_FILE }} \
                logs --tail=50 api
              exit 1
              "

      - name: Post-deploy summary
        if: success()
        run: |
          ssh -i ~/.ssh/oci_key \
              -o StrictHostKeyChecking=no \
              ${{ env.OCI_USER }}@${{ env.OCI_HOST }} \
              "echo '=== Deployed images ==='
              docker images ghcr.io/${{ env.REGISTRY_OWNER }}/fc-api --format '{{.Repository}}:{{.Tag}}\t{{.CreatedAt}}'
              docker images ghcr.io/${{ env.REGISTRY_OWNER }}/fc-portal --format '{{.Repository}}:{{.Tag}}\t{{.CreatedAt}}'
              echo ''
              echo '=== Running containers ==='
              docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | grep -E 'fc-|NAMES'
              "

      - name: Annotate deployment
        if: success()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build-push.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API image | \`${{ needs.build-push.outputs.api_image }}:${{ needs.build-push.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Portal image | \`${{ needs.build-push.outputs.portal_image }}:${{ needs.build-push.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OCI host | \`${{ env.OCI_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason || '(none given)' }} |" >> $GITHUB_STEP_SUMMARY
