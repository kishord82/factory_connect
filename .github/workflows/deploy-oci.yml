###############################################################################
# FactoryConnect — Smart Selective Deploy to OCI
#
# Detects what changed and only builds/deploys affected images:
#   - portal-only changes  → build + deploy portal only
#   - api-only changes     → build + deploy API only
#   - shared packages      → build + deploy both (both depend on @fc/shared)
#   - infra-only changes   → deploy both, no rebuild (compose/scripts updated)
#   - manual trigger       → respects "scope" dropdown (auto-detect | api-only | portal-only | both)
#
# Required repository secrets:
#   OCI_SSH_KEY   — Private SSH key for OCI VM (opc@92.4.94.2)
#   GHCR_TOKEN    — PAT with write:packages scope (for GHCR push)
#
# Built-in secrets used (no configuration needed):
#   GITHUB_TOKEN  — Auto-provided by Actions (fallback if GHCR_TOKEN not set)
###############################################################################

name: Deploy to OCI

on:
  push:
    branches: [phase1-dev]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".claude/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "phase1-dev"
        type: string
      scope:
        description: "What to build & deploy"
        required: true
        default: "auto-detect"
        type: choice
        options:
          - auto-detect
          - both
          - api-only
          - portal-only
      reason:
        description: "Reason for this deploy"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-oci-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: kishord82
  OCI_HOST: 92.4.94.2
  OCI_USER: opc
  COMPOSE_FILE: /home/opc/fc/scripts/oci/docker-compose.oci.yml
  ENV_FILE: /home/opc/fc/scripts/oci/.env.production

jobs:
  # ─── Detect Changes ──────────────────────────────────────────────────
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      build_api: ${{ steps.resolve.outputs.build_api }}
      build_portal: ${{ steps.resolve.outputs.build_portal }}
      deploy_api: ${{ steps.resolve.outputs.deploy_api }}
      deploy_portal: ${{ steps.resolve.outputs.deploy_portal }}
      infra_only: ${{ steps.resolve.outputs.infra_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 2

      # dorny/paths-filter compares HEAD against the previous commit on push,
      # or against the base branch on pull_request. On workflow_dispatch it
      # falls back to comparing HEAD~1 (fetch-depth: 2 above ensures this works).
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'docker/Dockerfile.api'
            portal:
              - 'apps/portal/**'
              - 'docker/Dockerfile.portal'
            shared:
              - 'packages/shared/**'
              - 'packages/database/**'
              - 'packages/config/**'
            infra:
              - 'scripts/oci/**'
              - 'docker-compose*.yml'
              - '.github/workflows/**'

      - name: Resolve build/deploy scope
        id: resolve
        env:
          # Dispatch inputs (empty string when triggered by push)
          DISPATCH_SCOPE: ${{ github.event.inputs.scope }}
          # Path-filter outputs
          CHANGED_API: ${{ steps.filter.outputs.api }}
          CHANGED_PORTAL: ${{ steps.filter.outputs.portal }}
          CHANGED_SHARED: ${{ steps.filter.outputs.shared }}
          CHANGED_INFRA: ${{ steps.filter.outputs.infra }}
        run: |
          build_api=false
          build_portal=false
          deploy_api=false
          deploy_portal=false
          infra_only=false

          # Manual dispatch: honour explicit scope first
          if [[ "$DISPATCH_SCOPE" == "api-only" ]]; then
            build_api=true
            deploy_api=true
          elif [[ "$DISPATCH_SCOPE" == "portal-only" ]]; then
            build_portal=true
            deploy_portal=true
          elif [[ "$DISPATCH_SCOPE" == "both" ]]; then
            build_api=true
            build_portal=true
            deploy_api=true
            deploy_portal=true
          else
            # auto-detect (used by push trigger AND manual with "auto-detect")

            # shared packages → rebuild both
            if [[ "$CHANGED_SHARED" == "true" ]]; then
              build_api=true
              build_portal=true
              deploy_api=true
              deploy_portal=true
            fi

            # API-specific changes
            if [[ "$CHANGED_API" == "true" ]]; then
              build_api=true
              deploy_api=true
            fi

            # Portal-specific changes
            if [[ "$CHANGED_PORTAL" == "true" ]]; then
              build_portal=true
              deploy_portal=true
            fi

            # Infra-only change (compose/scripts/workflows) — deploy without rebuild
            if [[ "$CHANGED_INFRA" == "true" ]] && \
               [[ "$CHANGED_API" == "false" ]] && \
               [[ "$CHANGED_PORTAL" == "false" ]] && \
               [[ "$CHANGED_SHARED" == "false" ]]; then
              deploy_api=true
              deploy_portal=true
              infra_only=true
            fi

            # Nothing detected (e.g. docs-only push slipped through) → no-op
            if [[ "$build_api" == "false" && "$build_portal" == "false" && \
                  "$deploy_api" == "false" && "$deploy_portal" == "false" ]]; then
              echo "No relevant changes detected — skipping deploy."
            fi
          fi

          echo "build_api=$build_api"       >> $GITHUB_OUTPUT
          echo "build_portal=$build_portal" >> $GITHUB_OUTPUT
          echo "deploy_api=$deploy_api"     >> $GITHUB_OUTPUT
          echo "deploy_portal=$deploy_portal" >> $GITHUB_OUTPUT
          echo "infra_only=$infra_only"     >> $GITHUB_OUTPUT

          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Signal | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| api files changed | $CHANGED_API |" >> $GITHUB_STEP_SUMMARY
          echo "| portal files changed | $CHANGED_PORTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| shared packages changed | $CHANGED_SHARED |" >> $GITHUB_STEP_SUMMARY
          echo "| infra files changed | $CHANGED_INFRA |" >> $GITHUB_STEP_SUMMARY
          echo "| dispatch scope | ${DISPATCH_SCOPE:-push} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Decision | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| build API | $build_api |" >> $GITHUB_STEP_SUMMARY
          echo "| build Portal | $build_portal |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy API | $deploy_api |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy Portal | $deploy_portal |" >> $GITHUB_STEP_SUMMARY
          echo "| infra-only (no rebuild) | $infra_only |" >> $GITHUB_STEP_SUMMARY

  # ─── Build & Push API Image ──────────────────────────────────────────
  build-api:
    name: Build & Push API (linux/amd64)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.build_api == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set image variables
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ env.REGISTRY_OWNER }}/fc-api" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker meta (API)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push API (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64-api
          cache-to: type=gha,scope=amd64-api,mode=max

  # ─── Build & Push Portal Image ───────────────────────────────────────
  build-portal:
    name: Build & Push Portal (linux/amd64)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.build_portal == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set image variables
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ env.REGISTRY_OWNER }}/fc-portal" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker meta (Portal)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push Portal (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.portal
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64-portal
          cache-to: type=gha,scope=amd64-portal,mode=max

  # ─── Deploy to OCI ───────────────────────────────────────────────────
  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    # Wait for whichever build jobs actually ran (skipped jobs are ignored by needs)
    needs: [detect, build-api, build-portal]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.detect.outputs.deploy_api == 'true' || needs.detect.outputs.deploy_portal == 'true') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-portal.result == 'success' || needs.build-portal.result == 'skipped')
    environment: phase1-dev

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ env.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          # SSH config: keepalive to prevent broken pipe during long docker pulls
          cat >> ~/.ssh/config <<'SSHCFG'
Host oci
  HostName ${{ env.OCI_HOST }}
  User ${{ env.OCI_USER }}
  IdentityFile ~/.ssh/oci_key
  StrictHostKeyChecking no
  ServerAliveInterval 30
  ServerAliveCountMax 20
  ConnectTimeout 30
SSHCFG
          chmod 600 ~/.ssh/config

      - name: Pull & restart on OCI
        env:
          DEPLOY_API: ${{ needs.detect.outputs.deploy_api }}
          DEPLOY_PORTAL: ${{ needs.detect.outputs.deploy_portal }}
          BUILD_API: ${{ needs.detect.outputs.build_api }}
          BUILD_PORTAL: ${{ needs.detect.outputs.build_portal }}
          INFRA_ONLY: ${{ needs.detect.outputs.infra_only }}
          API_SHA: ${{ needs.build-api.outputs.sha_short }}
          PORTAL_SHA: ${{ needs.build-portal.outputs.sha_short }}
          API_IMAGE: ${{ needs.build-api.outputs.image }}
          PORTAL_IMAGE: ${{ needs.build-portal.outputs.image }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # Build the list of services to restart
          SERVICES=""
          [[ "$DEPLOY_API" == "true" ]]    && SERVICES="$SERVICES api"
          [[ "$DEPLOY_PORTAL" == "true" ]] && SERVICES="$SERVICES portal"
          SERVICES="${SERVICES# }"  # trim leading space

          ssh oci \
              "set -euo pipefail

              echo '=== Logging in to GHCR ==='
              echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GITHUB_ACTOR}' --password-stdin

              # Pull and tag only the images that were rebuilt
              if [[ '${BUILD_API}' == 'true' && -n '${API_IMAGE}' ]]; then
                echo '=== Pulling API image (amd64, sha: ${API_SHA}) ==='
                docker pull --platform linux/amd64 ${API_IMAGE}:${API_SHA}
                docker tag ${API_IMAGE}:${API_SHA} ${API_IMAGE}:latest
              fi

              if [[ '${BUILD_PORTAL}' == 'true' && -n '${PORTAL_IMAGE}' ]]; then
                echo '=== Pulling Portal image (amd64, sha: ${PORTAL_SHA}) ==='
                docker pull --platform linux/amd64 ${PORTAL_IMAGE}:${PORTAL_SHA}
                docker tag ${PORTAL_IMAGE}:${PORTAL_SHA} ${PORTAL_IMAGE}:latest
              fi

              if [[ '${INFRA_ONLY}' == 'true' ]]; then
                echo '=== Infra-only deploy — no new images, restarting containers with updated compose/env ==='
              fi

              echo '=== Restarting: ${SERVICES} ==='
              docker compose \
                -f ${{ env.COMPOSE_FILE }} \
                --env-file ${{ env.ENV_FILE }} \
                up -d --no-build --pull never --no-deps ${SERVICES}

              echo '=== Waiting for containers to stabilise ==='
              sleep 10

              echo '=== Container status ==='
              docker compose \
                -f ${{ env.COMPOSE_FILE }} \
                --env-file ${{ env.ENV_FILE }} \
                ps ${SERVICES}
              "

      - name: Health check
        env:
          DEPLOY_API: ${{ needs.detect.outputs.deploy_api }}
          DEPLOY_PORTAL: ${{ needs.detect.outputs.deploy_portal }}
        run: |
          ssh oci \
              "set -euo pipefail

              check_container() {
                local name=\$1
                for i in \$(seq 1 20); do
                  status=\$(docker inspect --format '{{.State.Health.Status}}' fc-\${name} 2>/dev/null || echo 'missing')
                  if [[ \"\$status\" == 'healthy' ]]; then
                    echo \"fc-\${name} is healthy (attempt \$i)\"
                    return 0
                  fi
                  echo \"Attempt \$i/20 — fc-\${name} status: \$status\"
                  sleep 6
                done
                echo 'ERROR: fc-\${name} did not become healthy'
                docker logs fc-\${name} --tail=30 2>&1 || true
                return 1
              }

              [[ '${DEPLOY_API}' == 'true' ]]    && check_container api
              [[ '${DEPLOY_PORTAL}' == 'true' ]] && check_container portal

              echo '=== All deployed containers healthy ==='
              "

      - name: Post-deploy summary
        if: success()
        run: |
          ssh oci \
              "echo '=== Running containers ==='
              docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' | grep -E 'fc-|NAMES'
              "

          echo "### Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed | \`${{ needs.detect.outputs.deploy_api == 'true' && needs.detect.outputs.deploy_portal == 'true' && 'api + portal' || needs.detect.outputs.deploy_api == 'true' && 'api only' || 'portal only' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API image | \`${{ needs.build-api.outputs.image }}:${{ needs.build-api.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Portal image | \`${{ needs.build-portal.outputs.image }}:${{ needs.build-portal.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OCI host | \`${{ env.OCI_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason || 'push to phase1-dev' }} |" >> $GITHUB_STEP_SUMMARY
